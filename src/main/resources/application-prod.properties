# Production Environment Configuration
spring.profiles.active=prod

# ============================================
# Database Configuration (Production)
# ============================================
# SupabaseはSSL接続が必要なため、JDBC URL全体を環境変数で上書きできるように定義しておくとRenderでの設定が簡単になります
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:db.example.com}:${DB_PORT:5432}/${DB_NAME:staff_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:user}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:password}}

# ============================================
# CORS Configuration (Production)
# ============================================
# 本番環境での許可オリジン
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://example.com}

# ============================================
# Logging Configuration (Production)
# ============================================
logging.level.root=WARN
logging.level.org.example.ikichi_staffcard_project=INFO
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================
# Server Configuration (Production)
# ============================================
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
