<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更 | スタッフカードシステム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-brand-red: #D62300;
            --color-brand-brown: #502314;
            --color-brand-cream: #F5EBDC;
            --color-brand-light: #FDF8F2;
        }
    </style>
</head>
<body class="bg-brand-cream min-h-screen text-brand-brown font-sans flex items-center justify-center p-4">

<div class="w-full max-w-md bg-brand-light p-8 rounded-2xl border-2 border-amber-200 shadow-xl text-center">

    <div class="mb-6">
        <h2 class="text-2xl font-black tracking-widest text-brand-red">STAFF CARD</h2>
        <p class="text-xs font-black text-brand-brown tracking-wider uppercase">Security Notice</p>
    </div>

    <h1 class="text-xl font-black mb-2">🔒 パスワードの変更が必要です</h1>
    <p class="text-xs font-bold text-amber-800 mb-6 leading-relaxed">
        現在、初期パスワードでログインされています。<br>セキュリティー保護のため、あなた専用の新しいパスワードを設定してください。
    </p>

    <div th:if="${errorMessage}" class="bg-red-50 border-2 border-brand-red text-brand-red text-xs font-bold p-3 rounded-xl mb-4 text-left" th:text="${errorMessage}"></div>

    <form th:action="@{/users/change-password}" method="post" class="space-y-4 text-left">
        <div>
            <label class="block text-xs font-black mb-1">新しいパスワード</label>
            <input type="password" name="newPassword" required placeholder="8文字以上の英数字を推奨" minlength="4"
                   class="w-full p-3 rounded-xl border-2 border-amber-200 bg-white text-sm font-bold focus:outline-none focus:border-brand-red" />
        </div>

        <div>
            <label class="block text-xs font-black mb-1">新しいパスワード（確認用）</label>
            <input type="password" id="confirmPassword" required placeholder="もう一度入力してください"
                   class="w-full p-3 rounded-xl border-2 border-amber-200 bg-white text-sm font-bold focus:outline-none focus:border-brand-red" />
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-brand-red hover:bg-red-700 text-brand-light font-black text-sm p-3 rounded-full shadow transition-all cursor-pointer mt-2">
            パスワードを変更してシステムを開始する
        </button>
    </form>
</div>

<script>
    // フロント側での簡易な一致チェックバリデーション
    const form = document.querySelector('form');
    const newPwd = document.querySelector('input[name="newPassword"]');
    const confPwd = document.getElementById('confirmPassword');

    form.addEventListener('submit', (e) => {
        if (newPwd.value !== confPwd.value) {
            e.preventDefault();
            alert('新しいパスワードと確認用パスワードが一致しません。');
        }
    });
</script>
</body>
</html>
