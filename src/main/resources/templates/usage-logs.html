<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用ログ管理 | スタッフカードシステム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-brand-red: #D62300;
            --color-brand-brown: #502314;
            --color-brand-cream: #F5EBDC;
            --color-brand-light: #FDF8F2;
        }
    </style>
</head>
<body class="bg-brand-cream min-h-screen text-brand-brown font-sans flex">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="flex-1 p-4 md:p-8 ml-0 md:ml-64 transition-all">

    <div class="mb-8">
        <h1 class="text-2xl md:text-3xl font-black tracking-wider">利用ログ管理</h1>
        <p class="text-sm font-bold text-amber-800 mt-1">システムやカードの利用履歴をリアルタイムで確認・監査できます。</p>
    </div>

    <div class="bg-brand-light p-6 rounded-2xl border-2 border-amber-200 shadow-md overflow-x-auto">
        <div class="flex items-center justify-between mb-4 border-b-2 border-amber-200 pb-2">
            <h2 class="text-xl font-black">履歴一覧</h2>
            <span class="bg-amber-100 text-amber-900 text-xs font-black px-3 py-1 rounded-full"
                  th:text="|全 ${logs != null ? #lists.size(logs) : 0} 件|">全 0 件</span>
        </div>

        <table class="w-full text-left border-collapse min-w-[600px]">
            <thead>
            <tr class="border-b-2 border-amber-200 text-xs font-black uppercase text-amber-800">
                <th class="py-3 px-4 w-20">ログID</th>
                <th class="py-3 px-4">利用スタッフ</th>
                <th class="py-3 px-4">利用店舗</th>
                <th class="py-3 px-4">利用日時</th>
            </tr>
            </thead>
            <tbody class="text-sm font-bold divide-y divide-amber-100">
            <tr th:each="log : ${logs}" class="hover:bg-amber-50/50 transition-colors">
                <td class="py-4 px-4 font-black text-amber-900" th:text="${log.id}">1</td>
                <td class="py-4 px-4">
                    <div class="font-black text-brand-brown" th:text="${log.userName}">山田 太郎</div>
                    <div class="text-xs text-stone-500 font-mono mt-0.5" th:text="|ユーザー内ID: ${log.userId}|">ID: 10</div>
                </td>
                <td class="py-4 px-4">
                    <div class="font-black text-brand-red" th:text="${log.storeName}">盛岡中央店</div>
                    <div class="text-xs text-amber-700 font-mono mt-0.5" th:text="|店舗ID: ${log.usedAtStoreId}|">店舗ID: 2</div>
                </td>
                <td class="py-4 px-4 text-brand-brown font-mono text-xs"
                    th:text="${log.usedAt != null ? #temporals.format(log.usedAt, 'yyyy/MM/dd HH:mm:ss') : '日時不明'}">
                    2026/06/08 11:14:15
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(logs)}">
                <td colspan="4" class="py-8 text-center text-sm font-bold text-amber-700 bg-amber-50/20">
                    記録されている利用ログはまだありません。
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

</body>
</html>
