<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店舗詳細・所属スタッフ | スタッフカードシステム</title>
    <!-- Tailwind v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-brand-red: #D62300;
            --color-brand-brown: #502314;
            --color-brand-cream: #F5EBDC;
            --color-brand-light: #FDF8F2;
        }
    </style>
</head>
<body class="bg-brand-cream min-h-screen text-brand-brown font-sans flex">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="flex-1 p-4 md:p-8 pt-18 md:pt-8 ml-0 md:ml-64 transition-all">

    <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-black tracking-wider flex items-center gap-2">
                <span th:text="${storeWithUsers.comName}">店舗名</span> - 詳細・所属スタッフ
            </h1>
            <p class="text-sm font-bold text-amber-800 mt-1">
                この店舗に所属しているスタッフの一覧です。
            </p>
        </div>

        <a th:href="@{/store}" class="w-fit bg-brand-brown hover:bg-amber-950 hover:text-white text-brand-light font-black text-xs px-5 py-2.5 rounded-full shadow transition-all flex items-center gap-1">
            <span>⬅</span> 店舗一覧に戻る
        </a>
    </div>

    <div class="bg-brand-light p-6 rounded-2xl border-2 border-amber-200 shadow-md overflow-x-auto">
        <h2 class="text-lg font-black mb-4 border-b-2 border-amber-200 pb-2">
            所属スタッフ（計 <span th:text="${storeWithUsers.users != null ? #lists.size(storeWithUsers.users) : 0}">0</span> 名）
        </h2>

        <table class="w-full text-left border-collapse min-w-[500px]">
            <thead>
            <tr class="border-b-2 border-amber-200 text-xs font-black uppercase text-amber-800">
                <th class="py-3 px-4">スタッフID</th>
                <th class="py-3 px-4">名前</th>
                <th class="py-3 px-4">権限 (Role)</th>
                <th class="py-3 px-4">ステータス</th>
            </tr>
            </thead>
            <tbody class="text-sm font-bold divide-y divide-amber-100">
            <tr th:each="user : ${storeWithUsers.users}" class="hover:bg-amber-50/50 transition-colors">
                <td class="py-4 px-4 font-black text-brand-brown" th:text="${user.staffId}">staff001</td>
                <td class="py-4 px-4 text-amber-900" th:text="${user.name}">山田 太郎</td>
                <td class="py-4 px-4">
                            <span class="px-2 py-1 rounded-md text-xs font-black"
                                  th:classappend="${user.role == 'ADMIN' ? 'bg-red-100 text-brand-red' : (user.role == 'STORE_MANAGER' ? 'bg-amber-100 text-amber-800' : 'bg-stone-100 text-stone-700')}"
                                  th:text="${user.role}">STAFF</span>
                </td>
                <td class="py-4 px-4">
                            <span class="px-2 py-1 rounded-full text-xs font-black"
                                  th:classappend="${user.status == 'ACTIVE' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-brand-red'}"
                                  th:text="${user.status == 'ACTIVE' ? '有効' : '無効'}">有効</span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(storeWithUsers.users)}">
                <td colspan="4" class="py-8 text-center text-sm font-bold text-amber-700 bg-amber-50/20">
                    この店舗に所属しているスタッフはまだいません。
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

</body>
</html>
