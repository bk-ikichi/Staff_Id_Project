<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
</head>
<body>

<div th:fragment="sidebar">
    <!-- 1. モバイル用上部固定ヘッダー (スマホ時のみ表示) -->
    <header class="md:hidden fixed top-0 left-0 w-full h-14 bg-brand-light border-b-2 border-amber-200 px-4 flex items-center justify-between z-40 shadow-xs">
        <button id="sidebar-toggle" class="p-2 text-brand-brown hover:bg-amber-100 rounded-xl transition-colors cursor-pointer" aria-label="メニューを開く">
            <!-- ハンバーガーアイコン (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
        <span class="text-sm font-black tracking-widest text-brand-brown">STAFF CARD</span>
        <div class="w-10"></div> <!-- 左右バランス用ダミー -->
    </header>

    <!-- 2. モバイル用背景オーバーレイ (メニューが開いている時のみ背後を暗くする) -->
    <div id="sidebar-overlay" class="md:hidden fixed inset-0 bg-black/40 z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <!-- 3. サイドバーメニュー本体 -->
    <aside id="sidebar-menu"
           class="fixed inset-y-0 left-0 w-64 bg-brand-light border-r-2 border-amber-200 p-6 flex flex-col justify-between z-50
                  transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out shadow-lg md:shadow-none">
        <div>
            <div class="mb-10 pb-4 border-b-2 border-amber-200 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-black tracking-widest text-brand-red">STAFF CARD</h2>
                    <p class="text-xs font-black text-brand-brown tracking-wider uppercase">Management</p>
                </div>
                <!-- スマホ用閉じるボタン -->
                <button id="sidebar-close" class="md:hidden p-1.5 text-stone-400 hover:text-stone-700 cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <nav class="space-y-2">
                <a th:href="@{/users}"
                   class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-brand-brown hover:bg-amber-100/70 transition-colors cursor-pointer">
                    <span>スタッフ管理</span>
                </a>

                <a th:href="@{/store}"
                   class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-brand-brown hover:bg-amber-100/70 transition-colors cursor-pointer">
                    <span>店舗管理</span>
                </a>

                <a th:href="@{/usage}"
                   class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-brand-brown hover:bg-amber-100/70 transition-colors cursor-pointer">
                    <span>利用ログ管理</span>
                </a>

                <!-- 管理者自身がデジタル社員証へ戻るためのリンク -->
                <div class="border-t-2 border-amber-200/60 pt-2 mt-2">
                    <a th:href="@{/users/card}"
                       class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-brand-red bg-amber-50/50 hover:bg-amber-100/70 transition-colors cursor-pointer">
                        <span>デジタル社員証へ</span>
                    </a>
                </div>
            </nav>
        </div>

        <div class="pt-4 border-t-2 border-amber-200">
            <a th:href="@{/auth/logout}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-black text-brand-brown hover:bg-amber-100/70 transition-colors cursor-pointer">
                <span>ログアウト</span>
            </a>
        </div>
    </aside>

    <!-- 4. メニュー開閉用JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('sidebar-toggle');
            const closeBtn = document.getElementById('sidebar-close');
            const overlay = document.getElementById('sidebar-overlay');
            const menu = document.getElementById('sidebar-menu');

            function openMenu() {
                menu.classList.remove('-translate-x-full');
                overlay.classList.remove('pointer-events-none');
                overlay.classList.remove('opacity-0');
            }

            function closeMenu() {
                menu.classList.add('-translate-x-full');
                overlay.classList.add('pointer-events-none');
                overlay.classList.add('opacity-0');
            }

            if (toggleBtn && menu && overlay) {
                toggleBtn.addEventListener('click', openMenu);
                if (closeBtn) closeBtn.addEventListener('click', closeMenu);
                overlay.addEventListener('click', closeMenu);
            }
        });
    </script>
</div>

</body>
</html>
