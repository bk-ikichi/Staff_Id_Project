spring.profiles.active=prod

spring.application.name=Ikichi_StaffCard_Project
server.port=8080

# ============================================
# Database Configuration
# ============================================
spring.datasource.driver-class-name=org.postgresql.Driver
# Render??????????Supabase????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.pnxaiulwjodytokhdewu.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ============================================
# MyBatis Configuration
# ============================================
mybatis.type-aliases-package=org.example.ikichi_staffcard_project.dto
mybatis.configuration.map-underscore-to-camel-case=true

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.expiration=${JWT_EXPIRATION:6000000}

# ============================================
# CORS Configuration
# ============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.org.example.ikichi_staffcard_project=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# Encoding Configuration
# ============================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.thymeleaf.encoding=UTF-8